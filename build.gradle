plugins {
    id 'java'
}

sourceSets {
    test{
        resources {
            srcDir('src/test/java')
            exclude '**/*.java'
        }
    }
}

repositories {
    mavenCentral()
}

compileJava.options.encoding = "UTF-8"
compileTestJava.options.encoding = "UTF-8"

dependencies {
    testImplementation("com.intuit.karate:karate-junit5:1.3.1")
}

test {
    useJUnitPlatform()
}